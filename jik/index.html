<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicNode | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This ensures the middle section fills the space between header and footer */
        .auth-wrapper {
            min-height: calc(100vh - 140px);
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <header class="bg-white border-b border-slate-200 py-4 px-8 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">+</div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">ClinicNode</h1>
            </div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">
                Medical Management System
            </div>
        </div>
    </header>

    <main class="auth-wrapper flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 transition-all">
            
            <div class="flex mb-8 bg-slate-100 p-1 rounded-2xl">
                <button onclick="showAuth('login')" id="btn-login" class="flex-1 py-2 rounded-xl text-sm font-bold bg-white shadow-sm text-blue-600 transition-all">Log In</button>
                <button onclick="showAuth('signup')" id="btn-signup" class="flex-1 py-2 rounded-xl text-sm font-bold text-slate-500 transition-all">Sign Up</button>
            </div>

            <form id="login-form" action="dashboard.html" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Admin Email</label>
                    <input type="email" required placeholder="name@gmail.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-transform active:scale-95">
                    Access Dashboard
                </button>
            </form>

            <form id="signup-form" action="dashboard.html" class="space-y-5 hidden">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Clinic Name</label>
                    <input type="text" required placeholder="Cebu General Hospital" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Email</label>
                    <input type="email" required placeholder="admin@clinic.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-200 transition-transform active:scale-95">
                    Create Clinic Account
                </button>
            </form>

            <p class="text-center text-xs text-slate-400 mt-8">
                By continuing, you agree to the ClinicNode Terms of Service.
            </p>
        </div>
    </main>

    <footer class="py-6 border-t border-slate-200 bg-white">
        <div class="container mx-auto text-center">
            <p class="text-slate-400 text-sm">ClinicNode.</p>
        </div>
    </footer>

    <script>
        function showAuth(type) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');

            if(type === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                btnLogin.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                btnSignup.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                btnSignup.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                btnLogin.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            }
			 window.location.href = "dashboad.html";
        }
    </script>
</body>
</html>
